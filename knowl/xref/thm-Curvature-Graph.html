<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">13.4.13</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">Curvature of the Graph of <span class="process-math">\(f\)</span>.</span>
</h4>
<div class="para logical">
<div class="para">The curvature at the point <span class="process-math">\(\lp x, f(x) \rp\)</span> on the graph of <span class="process-math">\(y = f(x)\)</span> is equal to</div>
<div class="displaymath process-math">
\begin{equation*}
\kappa(x) = \frac{|f''(x)|}{\lp 1 + \lp f'(x) \rp^2 \rp^\frac{3}{2}}
\end{equation*}
</div>
